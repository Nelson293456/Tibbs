<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tibbsle — Daily Cat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#1b2029; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; overflow:hidden; background:#151a23; }
  body{
    display:flex; align-items:center; justify-content:center;
    font-family:'Press Start 2P', monospace;
    touch-action:none; -webkit-user-select:none; user-select:none;
    background:
      radial-gradient(1200px 800px at 50% 30%, #232c3b 0%, #151a23 70%);
  }
  #wrap{ position:relative; }
  #ovl{
    position:fixed; inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(10,14,22,0.7); z-index:10;
  }
  #ovl .panel{
    background:#1a2130; border-radius:16px; padding:26px 24px;
    width:min(360px, 88vw); text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.6), 0 0 0 3px rgba(255,255,255,.08);
  }
  #ovl .t{ color:#ffd94d; font-size:14px; margin-bottom:18px; letter-spacing:1px; }
  #ovl input{
    width:100%; padding:12px; font-family:inherit; font-size:13px;
    background:#0f141f; color:#fff; border:3px solid #2c3a52; border-radius:10px;
    outline:none; text-align:center; margin-bottom:14px;
  }
  #ovl input:focus{ border-color:#7ec850; }
  #ovl button{
    display:block; width:100%; padding:13px; margin-bottom:10px;
    font-family:inherit; font-size:12px; border:none; border-radius:10px;
    cursor:pointer; color:#173015; background:#7ec850;
  }
  #ovl button.alt{ background:#4d8fe8; color:#0e1a2e; }
  #ovl button.ghost{ background:transparent; color:#9fb2cc; font-size:10px; }
  #ovl #ovlMsg{ color:#9fb2cc; font-size:9px; min-height:14px; line-height:1.6; }
  canvas{
    display:block;
    image-rendering:auto;
    border-radius:10px;
    box-shadow:0 18px 60px rgba(0,0,0,.55), 0 0 0 4px rgba(255,255,255,.04);
    cursor:pointer;
  }
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>
<div id="ovl">
  <div class="panel">
    <div class="t">PLAYER NAME</div>
    <input id="nameInput" maxlength="12" placeholder="MrTibbsFan" autocomplete="off">
    <button id="saveNameBtn">SAVE NAME</button>
    <button id="googleBtn" class="alt">SIGN IN WITH GOOGLE</button>
    <button id="closeOvlBtn" class="ghost">back to game</button>
    <div id="ovlMsg"></div>
  </div>
</div>

/* ============================== setup ============================== */
const CELL = 64;
const COLS = 9;                 // 0..8, playable 1..7
const W = COLS * CELL;          // 576
const H = 12 * CELL;            // 768
const PLAY_MIN = 1, PLAY_MAX = 7;

const cv = document.getElementById('game');
const cx = cv.getContext('2d');
cv.width = W; cv.height = H;

function fitCanvas(){
  const pad = 12;
  const s = Math.min((innerWidth - pad) / W, (innerHeight - pad) / H);
  // keep the exact W:H ratio so pointer mapping stays uniform on both axes
  cv.style.width  = (W * s) + 'px';
  cv.style.height = (H * s) + 'px';
}
addEventListener('resize', fitCanvas); fitCanvas();

/* ---- load sprites ---- */
const S = {};
let loaded = 0, total = 0;
for (const k in ASSETS_DATA){
  total++;
  const im = new Image();
  im.onload = () => loaded++;
  im.src = ASSETS_DATA[k];
  S[k] = im;
}

/* ---- tinted roomba variants ---- */
const roombaTints = ['#e8574d', '#4d8fe8', '#e8b84d', '#7bc96f', '#b06fd8'];
const roombaCache = [];
function makeRoombas(){
  for (const t of roombaTints){
    const c = document.createElement('canvas');
    c.width = S.roomba.width; c.height = S.roomba.height;
    const g = c.getContext('2d');
    g.drawImage(S.roomba, 0, 0);
    g.globalCompositeOperation = 'source-atop';
    g.globalAlpha = 0.38;
    g.fillStyle = t;
    g.fillRect(0, 0, c.width, c.height);
    roombaCache.push(c);
  }
}

/* ============================== audio ============================== */
let AC = null, muted = false;
function audio(){ if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC && AC.state==='suspended') AC.resume(); if(AC) startMusic(); }
function tone(f0, f1, dur, type='square', vol=0.12, when=0){
  if(!AC || muted) return;
  const t = AC.currentTime + when;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(f0, t);
  if (f1) o.frequency.exponentialRampToValueAtTime(f1, t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(AC.destination);
  o.start(t); o.stop(t + dur + 0.02);
}
function noise(dur, f=800, vol=0.2, sweepTo=null){
  if(!AC || muted) return;
  const t = AC.currentTime;
  const n = AC.sampleRate * dur;
  const buf = AC.createBuffer(1, n, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<n;i++) d[i] = Math.random()*2-1;
  const src = AC.createBufferSource(); src.buffer = buf;
  const flt = AC.createBiquadFilter(); flt.type='lowpass';
  flt.frequency.setValueAtTime(f, t);
  if (sweepTo) flt.frequency.exponentialRampToValueAtTime(sweepTo, t+dur);
  const g = AC.createGain();
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  src.connect(flt); flt.connect(g); g.connect(AC.destination);
  src.start(t);
}
const sfx = {
  hop(){ const j = rnd(-30,40); tone(340+j, 560+j, 0.07, 'square', 0.07); buzz(8); },
  coin(){ tone(920, 0, 0.06, 'square', 0.09); tone(1380, 0, 0.09, 'square', 0.09, 0.06); },
  milk(){ [660,880,1100,1320].forEach((f,i)=>tone(f,0,0.09,'triangle',0.1,i*0.07)); buzz([12,30,12]); },
  yarn(){ tone(520,780,0.09,'triangle',0.09); },
  splash(){ noise(0.4, 1400, 0.25, 220); tone(300,120,0.3,'sine',0.1); buzz(40); },
  crash(){ noise(0.25, 900, 0.3, 250); tone(120,55,0.25,'sawtooth',0.16); buzz([50,40,60]); },
  warn(){ tone(1250,0,0.09,'triangle',0.12); tone(1250,0,0.09,'triangle',0.12,0.16); buzz(15); },
  swoop(){ noise(0.5, 2400, 0.14, 500); tone(800,240,0.45,'sawtooth',0.05); buzz([30,20,40]); },
  over(){ [520,392,330,262].forEach((f,i)=>tone(f,0,0.16,'square',0.08,i*0.13)); },
  bell(){ tone(1568,0,0.25,'triangle',0.13); tone(2093,0,0.35,'triangle',0.09,0.09); buzz([15,25,15]); },
  rescue(){ [523,659,784,1047].forEach((f,i)=>tone(f,0,0.1,'triangle',0.11,i*0.06)); buzz([20,30,40]); },

// haptics — silent no-op on desktop / unsupported devices
let hapticsOn = true;
function buzz(pattern){
  if (!hapticsOn || muted) return;
  try{ if (navigator.vibrate) navigator.vibrate(pattern); }catch(e){}
}

/* ---- tiny chiptune loop ---- */
const MELODY = [659,784,880,0, 784,659,587,0, 523,587,659,784, 659,587,523,0,
                440,523,587,0, 659,587,523,0, 392,440,523,587, 523,440,392,0];
const BASS   = [131,0,131,0, 110,0,110,0, 87,0,87,0, 98,0,98,0,
                131,0,131,0, 110,0,110,0, 87,0,87,0, 98,0,131,0];
let musicStep = 0, musicNext = 0, musicTimer = null;
function musicTick(){
  if (!AC || muted) return;
  const stepDur = 0.16;
  while (musicNext < AC.currentTime + 0.25){
    const m = MELODY[musicStep % MELODY.length];
    const b = BASS[musicStep % BASS.length];
    if (m) tone(m, 0, 0.13, 'square', state==='play'?0.028:0.018, musicNext - AC.currentTime);
    if (b) tone(b, 0, 0.15, 'triangle', 0.05, musicNext - AC.currentTime);
    musicNext += stepDur;
    musicStep++;
  }
}
function startMusic(){
  if (musicTimer || !AC) return;
  musicNext = AC.currentTime + 0.1;
  musicTimer = setInterval(musicTick, 90);
  startAmbient();
}

/* ---- ambient pad: gentle filtered noise that shifts with the biome ---- */
let ambNode = null, ambGain = null, ambFilter = null;
function startAmbient(){
  if (ambNode || !AC) return;
  const bufLen = AC.sampleRate * 2;
  const buf = AC.createBuffer(1, bufLen, AC.sampleRate);
  const d = buf.getChannelData(0);
  let last = 0;
  for (let i=0;i<bufLen;i++){        // brown-ish noise = soft, not hissy
    const w = Math.random()*2-1;
    last = (last + 0.02*w) / 1.02;
    d[i] = last*3.2;
  }
  ambNode = AC.createBufferSource();
  ambNode.buffer = buf; ambNode.loop = true;
  ambFilter = AC.createBiquadFilter();
  ambFilter.type = 'lowpass'; ambFilter.frequency.value = 500;
  ambGain = AC.createGain(); ambGain.gain.value = 0;
  ambNode.connect(ambFilter); ambFilter.connect(ambGain); ambGain.connect(AC.destination);
  ambNode.start();
}
function updateAmbient(){
  if (!ambGain || !AC) return;

function tintSprite(img, tint){
  const c = document.createElement('canvas');
  c.width = img.width; c.height = img.height;
  const g = c.getContext('2d');
  g.drawImage(img, 0, 0);
  const d = g.getImageData(0,0,c.width,c.height);
  const px = d.data;
  const [tr,tg,tb] = tint.rgb;
  for (let i=0;i<px.length;i+=4){
    if (px[i+3] === 0) continue;
    const lum = (0.3*px[i] + 0.59*px[i+1] + 0.11*px[i+2]) / 255;
    px[i]   = Math.min(255, lum*tr*2*tint.dark + tint.light*255);
    px[i+1] = Math.min(255, lum*tg*2*tint.dark + tint.light*255);
    px[i+2] = Math.min(255, lum*tb*2*tint.dark + tint.light*255);
  }
  g.putImageData(d, 0, 0);
  return c;
}

// mulberry32 — tiny deterministic PRNG; same seed = same world for everyone
function mulberry32(a){
  return function(){
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function hashStr(s){
  let h = 1779033703 ^ s.length;
  for (let i=0;i<s.length;i++){ h = Math.imul(h ^ s.charCodeAt(i), 3432918353); h = (h<<13)|(h>>>19); }
  return h >>> 0;
}
function todayStr(){
  const d = new Date();
  return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');
}
function weekStr(){
  // ISO week number, UTC — same key Mon–Sun for everyone
  const d = new Date();
  const day = (d.getUTCDay()+6)%7;                  // Mon=0
  d.setUTCDate(d.getUTCDate()-day+3);               // nearest Thursday
  const firstThu = new Date(Date.UTC(d.getUTCFullYear(),0,4));
  const week = 1 + Math.round(((d - firstThu)/86400000 - 3 + ((firstThu.getUTCDay()+6)%7))/7);
  return d.getUTCFullYear()+'-W'+String(week).padStart(2,'0');
}

// interpolate the ghost's screen position at elapsed run-time `et`
function ghostPos(et){
  const f = ghost.frames;
  if (!f.length) return null;
  if (et <= f[0].t) return { c:f[0].c, r:f[0].r };
  for (let i=0;i<f.length-1;i++){
    if (et >= f[i].t && et <= f[i+1].t){
      const span = (f[i+1].t - f[i].t) || 0.001;
      const k = (et - f[i].t)/span;
      return { c: f[i].c + (f[i+1].c-f[i].c)*k, r: f[i].r + (f[i+1].r-f[i].r)*k };
    }
  }
  const last = f[f.length-1];
  return { c:last.c, r:last.r, done:true };
}
function rainAmount(){
  const cyc = Math.floor(Math.max(0,maxRow)/80);
  const h = Math.abs(Math.sin(cyc*12.9898 + rainSeed)*43758.5453) % 1;
  if (h > 0.42) return 0;                       // ~42% of day-cycles are rainy
  const p = cyclePos();
  if (p < 0.04 || p > 0.4) return 0;            // rain during the morning stretch
  const inRamp = Math.min(1,(p-0.04)/0.06), outRamp = Math.min(1,(0.4-p)/0.06);
  return Math.min(inRamp, outRamp);
}

function grassRow(r, dense){
  const row = { type:'grass', obstacles:new Set(), coins:new Map() };
  // frame edges
  row.obstacles.add(0); row.obstacles.add(8);
  if (r > 3 && dense !== false){
    const n = genRand() < 0.55 ? grndi(0,2) : 0;
    const free = [];
    for (let c=PLAY_MIN;c<=PLAY_MAX;c++) free.push(c);
    for (let i=0;i<n;i++){
      const c = gpick(free.filter(c=>!row.obstacles.has(c)));
      if (c !== undefined && c !== 4) row.obstacles.add(c); // keep column 4 clear-ish
    }
  }
  // collectibles
  for (let c=PLAY_MIN;c<=PLAY_MAX;c++){
    if (row.obstacles.has(c)) continue;
    const roll = genRand();
    if (roll < 0.01 && r > 10) row.coins.set(c,'gold');
    else if (roll < 0.018 && r > 6) row.coins.set(c,'bell');
    else if (roll < 0.05) row.coins.set(c,'milk');
    else if (roll < 0.17) row.coins.set(c,'fishC');
    else if (roll < 0.22) row.coins.set(c,'yarn');
  }
  row.tiles = [];
  for (let c=PLAY_MIN;c<=PLAY_MAX;c++)
    if (row.obstacles.has(c)) row.tiles.push({c, kind: genRand()<0.7?'bush':'scratch'});
  return row;
}
function roadRow(r){
  const mul = 1 + Math.min(r*0.008, 0.85);
  const dir = genRand()<0.5?-1:1;
  const speed = grnd(52,105)*mul;
  const useDog = r>8 && genRand()<0.22;
  const gap = clamp(grnd(240,350) - r*1.1, 195, 350);
  const n = Math.max(2, Math.round((W + 2*CELL)/gap));
  const trackW = Math.max(W + 2.5*CELL, n*gap);
  const cars = [];
  let x = grnd(0, gap);
  for (let i=0;i<n;i++){
    cars.push({ x:(x + i*gap + grnd(-30,30)) % trackW,
                kind: useDog && i===0 ? 'dog' : 'roomba',
                v: grndi(0, roombaTints.length-1) });
  }
  return { type:'road', dir, speed, trackW, cars, coins:new Map(), maybeCoin(){ } };
}
function riverRow(r, below){
  const mul = 1 + Math.min(r*0.006, 0.5);
  const stacked = !!(below && below.type==='river');
  // STACKED-RIVER FAIRNESS: consecutive rivers ALWAYS flow opposite ways,
  // so from a moving log the next row's logs stream past quickly — a
  // reachable log is guaranteed within ~2s instead of "maybe never"
  const dir = stacked ? -below.dir : (genRand()<0.5?-1:1);
  const speed = clamp(grnd(stacked?42:38, stacked?68:70)*mul, 38, 82);
  // circular track: logs + gaps sum EXACTLY to trackW, so nothing can
  // ever overlap on wrap, and every gap is between minGap and ~maxGap
  const trackW = W + 3*CELL;
  const minGap = CELL*1.25;
  const maxGap = CELL*(stacked ? 1.55 : (2.35 - Math.min(r*0.003, 0.35)));
  const mkLog = ()=>{
    if (genRand()<0.32) return { kind:'couch', w:CELL*2, n:0, fish:genRand()<0.4 };
    const n = grndi(1, genRand()<0.35?3:2);
    return { kind:'crate', w:n*CELL, n, fish:false };
  };
  const logs = [];
  let sumW = 0;
  while (logs.length < 10){
    let L = mkLog();
    if ((trackW - (sumW + L.w)) / (logs.length+1) < minGap){
      // this log is too big to fit fairly — try the smallest one instead
      L = { kind:'crate', w:CELL, n:1, fish:false };
      if ((trackW - (sumW + L.w)) / (logs.length+1) < minGap) break;
    }
    logs.push(L); sumW += L.w;
    if ((trackW - sumW) / logs.length <= maxGap) break;                // gaps now small enough
  }
  // distribute the leftover space into gaps: every gap >= minGap, none huge
  let rem = trackW - sumW - minGap*logs.length;
  const weights = logs.map(()=>grnd(0.7,1.3));
  const wSum = weights.reduce((a,b)=>a+b,0);
  const gaps = weights.map(w=>minGap + rem*w/wSum);
  // cap straggler gaps by donating excess to the smallest gap; repeat a
  // few passes so the donation itself can't push another gap over the cap
  const cap = maxGap*1.12;
  for (let pass=0; pass<4; pass++){
    let changed = false;
    for (let i=0;i<gaps.length;i++){
      if (gaps[i] > cap){
        const excess = gaps[i]-cap;
        gaps[i] = cap;
        let j = 0;
        for (let k2=1;k2<gaps.length;k2++) if (gaps[k2]<gaps[j]) j=k2;
        gaps[j] += excess;
        changed = true;
      }
    }
    if (!changed) break;
  }
  let x = grnd(0, trackW);
  for (let i=0;i<logs.length;i++){
    logs[i].x = (x + logs[i].w/2) % trackW;
    x += logs[i].w + gaps[i];
  }
  return { type:'river', dir, speed, trackW, logs };
}
function pondRow(){
  // still water with cat-bed islands — always statically crossable
  const beds = new Set();
  const coins = new Map();
  let c = grndi(PLAY_MIN, PLAY_MIN+1);
  while (c <= PLAY_MAX){
    beds.add(c);
    if (genRand()<0.3) coins.set(c,'fishC');
    c += grndi(2,3);
  }
  if (!beds.has(PLAY_MAX) && genRand()<0.5) beds.add(PLAY_MAX);
  return { type:'pond', beds, coins };
}

}

function nextBand(r, prevType, prevRow){
  const roll = genRand();
  const roadMax = r<12 ? 2 : r<30 ? 3 : 4;
  if (r > 10 && roll < 0.1) return [zoomRow()];
  if (roll < 0.42){
    const n = grndi(1, roadMax);
    return Array.from({length:n}, ()=>roadRow(r));
  }
  if (roll < 0.52 && r > 6 && prevType !== 'river' && prevType !== 'pond'){
    return [pondRow()];   // ponds only after dry land so you can line up
  }
  if (roll < 0.74 && r > 4){
    // chain constraints: each river knows the river directly below it,
    // including one left over from the previous band
    const n = grndi(1, 2);
    const out = [];
    let below = prevRow;
    for (let i=0;i<n;i++){
      const rr = riverRow(r, below);
      out.push(rr);
      below = rr;
    }
    return out;
  }
  return Array.from({length:grndi(1,2)}, (_,i)=>grassRow(r+i));
}

function ensureRows(){
  const need = Math.ceil((camY + H + 5*CELL) / CELL);
  while (lastRow < need){
    if (bandQueue.length === 0){
      const prevRow = rows[lastRow];
      const prevType = prevRow ? prevRow.type : 'grass';
      bandQueue = nextBand(lastRow+1, prevType, prevRow);
      // always give a grass breather after rivers sometimes
      if (bandQueue[0].type !== 'grass' && genRand()<0.5)
        bandQueue.push(grassRow(lastRow+1+bandQueue.length));
    }
    lastRow++;
    rows[lastRow] = bandQueue.shift();
  }
  const cut = Math.floor((camY - 4*CELL)/CELL);
  while (firstRow < cut){ delete rows[firstRow]; firstRow++; }
}

  laneTrail = [];
  ghostRec = []; ghostRunStart = time;
  ghostActive = dailyMode && ghost && ghost.frames && ghost.frames.length > 0;
  rows = {}; bandQueue = [];
  firstRow = -3; lastRow = -4;
  for (let r=-3;r<=5;r++){ rows[r] = grassRow(r, r<4?false:true); lastRow = r; }
  camY = -2*CELL;
  creep = 0; startedMoving = false;
  player = { px: colX(4), row: 1, wy: 1*CELL,
             hop:null, facing:'up', onLog:null, alive:true, visible:true };
  coinsGot = 0; maxRow = 0;
  hearts = 0; invuln = 0;
  zoomies = 0; zoomiesHops = 0; zoomiesAuto = 0; zoomiesElapsed = 0;
  streak = 0; lastForwardAt = -9;
  rainSeed = dailyMode ? genRand()*1000 : Math.random()*1000;
  lastSafe = { row:1, px:colX(4) };
  newBestShown = false; lastMilestone = 0;
  idleT = 0; birdWarn=false; birdSwoop=null;
  effects = []; deathAnim = null; shake = 0;
  ensureRows();
}

function tryHop(dx, dy){
  if (state==='title'){ startPlay(); return; }
  if (state!=='play' || !player.alive || player.hop) return;
  const targetRow = player.row + dy;
  const tr = rows[targetRow];
  if (!tr) return;
  // STRICT GRID: every hop lands dead-center on a column, even when
  // taking off from a drifting log — so the world always lines back up
  const curCol = clamp(Math.round((player.px-CELL/2)/CELL), PLAY_MIN, PLAY_MAX);
  const targetCol = clamp(curCol + dx, PLAY_MIN, PLAY_MAX);
  if (dx !== 0 && targetCol === curCol && !player.onLog){
    // bumped the playfield edge — tiny nudge feedback, no move
    effects.push({kind:'bonk', x:player.px + dx*CELL*0.3, wy:player.row*CELL, t:0});
    tone(180,120,0.08,'square',0.06);
    return;
  }
  const targetPx = colX(targetCol);
  if (tr.type==='grass' && tr.obstacles.has(targetCol)){ // bonk — no move
    effects.push({kind:'bonk', x:player.px + dx*CELL*0.4, wy:(player.row+dy*0.4)*CELL, t:0});
    tone(180,120,0.08,'square',0.08);
    return;
  }
  player.facing = dy>0?'up':dy<0?'down':dx<0?'left':'right';
  if (dy > 0){
    streak = (time - lastForwardAt < 0.45) ? streak+1 : 1;
    lastForwardAt = time;
    if (streak > 0 && streak % 10 === 0){
      coinsGot += 2*fishMult;
      pop('STREAK +'+(2*fishMult), '#ffd94d');
      tone(880 + streak*20, 0, 0.08, 'square', 0.09);
      tone(1320 + streak*20, 0, 0.1, 'square', 0.09, 0.06);
    }
  } else {
    lastForwardAt = time;   // side hops keep the streak alive but don't grow it
  }
  player.hop = { t:0, dur:0.15, fromPx:player.px, fromWy:player.wy,
                 toPx:targetPx, toRow:targetRow, toWy:targetRow*CELL };
  player.onLog = null;
  idleT = 0; birdWarn = false;
  startedMoving = true;
  unlockAch('first');
  sfx.hop();
  effects.push({kind:'dust', x:player.px, wy:player.wy, t:0});
}

function collectAt(row, c){
  if (!row.coins || !row.coins.has(c)) return;
  const kind = row.coins.get(c);
  row.coins.delete(c);
  if (kind==='fishC'){ coinsGot += 1*fishMult; sfx.coin(); effects.push({kind:'stars', x:player.px, wy:player.wy, t:0}); pop('+'+fishMult); }
  if (kind==='milk'){ coinsGot += 5*fishMult; sfx.milk(); effects.push({kind:'hearts', x:player.px, wy:player.wy, t:0}); pop('+'+(5*fishMult)); }
  if (kind==='yarn'){ coinsGot += 2*fishMult; sfx.yarn(); effects.push({kind:'stars', x:player.px, wy:player.wy, t:0}); pop('+'+(2*fishMult)); }
  if (kind==='bell'){
    if (hearts < 2){ hearts++; sfx.bell(); effects.push({kind:'hearts', x:player.px, wy:player.wy, t:0}); pop('+ LIFE', '#ff6d8a'); }
    else { coinsGot += 3*fishMult; sfx.bell(); pop('+'+(3*fishMult)); }
  }
  if (kind==='gold'){
    if (zoomies > 0){
      // already zooming — top up the timer but keep the elapsed ceiling
      zoomies = Math.min(zoomies + 1.5, 3.2);
    } else {
      zoomies = 3.2; zoomiesHops = 0; zoomiesAuto = 0; zoomiesElapsed = 0;
    }
    invuln = Math.max(invuln, zoomies);
    sfx.rescue(); sfx.milk();
    effects.push({kind:'banner', text:'ZOOMIES!', t:0, dur:1.6});
    effects.push({kind:'stars', x:player.px, wy:player.wy, t:0});
  }
}
function pop(text, color){
  effects.push({kind:'pop', text, color:color||'#fff', x:player.px, wy:player.wy, t:0, dur:0.9});
}

function landPlayer(){
  const h = player.hop;
  player.px = h.toPx; player.row = h.toRow; player.wy = h.toWy;
  player.hop = null;
  recordGhost();
  if (player.row > maxRow){
    maxRow = player.row;
    if (maxRow >= 25) unlockAch('r25');
    if (maxRow >= 50) unlockAch('r50');
    if (maxRow >= 100) unlockAch('r100');
    const lr = rows[player.row];
    if (lr){
      const e = lr.type==='road' ? '\u{1F697}'
              : lr.type==='river' ? '\u{1F30A}'
              : lr.type==='pond'  ? '\u{1F4A7}'
              : lr.type==='zoom'  ? '\u{1F4A8}'
              : '\u{1F7E9}';
      laneTrail.push(e);
    }
    if (best > 0 && maxRow > best && !newBestShown){
      newBestShown = true;
      effects.push({kind:'banner', text:'NEW BEST!', t:0, dur:1.6});
      sfx.milk();
    }
    if (maxRow - lastMilestone >= 25){
      lastMilestone = Math.floor(maxRow/25)*25;
      effects.push({kind:'banner', text:lastMilestone+'!', t:0, dur:1.2});
      sfx.coin();
    }
  }
  const row = rows[player.row];
  if (!row){ return; }
  if (row.type==='river'){
    let hit = null;
    for (const L of row.logs){
      const lx = logScreenX(row, L);
      if (Math.abs(player.px - lx) < L.w/2 + 8){ hit = {row, L}; break; }
    }
    if (hit){
      player.onLog = hit;
      if (hit.L.kind === 'couch'){
        couchesThisRun.add(hit.L);
        if (couchesThisRun.size >= 5) unlockAch('couch5');
        if (couchesThisRun.size >= 5 && !unlocked.gold){
          unlocked.gold = true;
          unlockAch('gold');
          effects.push({kind:'banner', text:'GOLDEN TIBBS UNLOCKED!', t:0, dur:2.4});
          effects.push({kind:'hearts', x:player.px, wy:player.wy, t:0});
          sfx.rescue();
          saveMeta();
        }
      }
      // magnetic landing: pull the cat fully onto the log
      const lx = logScreenX(hit.row, hit.L);
      player.px = clamp(player.px, lx - hit.L.w/2 + 16, lx + hit.L.w/2 - 16);
      effects.push({kind:'ripple', x:player.px, wy:player.wy, t:0});
      if (hit.L.fish){ hit.L.fish=false; coinsGot += fishMult; sfx.coin(); pop('+1'); effects.push({kind:'stars', x:player.px, wy:player.wy, t:0}); }
    }
    else if (zoomies > 0){ /* skim across water during zoomies */ }
    else { die('water'); return; }
  } else if (row.type==='pond'){
    const c = Math.round((player.px-CELL/2)/CELL);
    if (row.beds.has(c)){
      player.px = colX(c);
      lastSafe = { row:player.row, px:player.px };
      effects.push({kind:'ripple', x:player.px, wy:player.wy, t:0});
      collectAt(row, c);
    } else if (zoomies > 0){ /* skim across pond during zoomies */ }
    else { die('water'); return; }
  } else {
    const c = Math.round((player.px-CELL/2)/CELL);
    if (row.type==='grass') lastSafe = { row:player.row, px:colX(clamp(c,PLAY_MIN,PLAY_MAX)) };
    collectAt(row, c);
  }
}

function logScreenX(row, L){
  // continuous world x of log center (wrapping track centered on screen)
  let x = L.x + row.dir * row.scroll;
  x = ((x % row.trackW) + row.trackW) % row.trackW;
  return x - 2*CELL; // track extends off both edges
}
function carScreenX(row, car){
  let x = car.x + row.dir * row.scroll;
  x = ((x % row.trackW) + row.trackW) % row.trackW;
  return x - 1.25*CELL;
}

function buildShareText(){
  const cause = {
    roomba:'flattened by a roomba', dog:'caught by the bulldog', zoom:'zoomied out',
    water:'fell in the water', bird:'birdnapped', behind:'left behind',
  }[deathCause] || 'game over';
  // Wordle-style grid using uniform-width square emoji so it always lines up
  // 🟩 grass  🟥 road  🟦 river  🟪 pond  ⬜ zoomies
  const sq = { grass:'\u{1F7E9}', road:'\u{1F7E5}', river:'\u{1F7E6}', pond:'\u{1F7EA}', zoom:'\u2B1C' };
  const emoji = { '\u{1F7E9}':'grass','\u{1F697}':'road','\u{1F30A}':'river','\u{1F4A7}':'pond','\u{1F4A8}':'zoom' };
  let squares = laneTrail.map(e => sq[emoji[e]] || sq.grass);
  const capped = squares.length > 40;
  if (capped) squares = squares.slice(-40);   // keep the final stretch
  let grid = '';
  for (let i=0;i<squares.length;i+=10){
    grid += squares.slice(i, i+10).join('') + '\n';
  }
  const site = (location && location.host) ? location.host : 'tibbsle.game';
  return `Tibbsle ${dailyDate}\n`
       + `Row ${maxRow}  \u{1F41F}${coinsGot}\n`
       + (capped ? '\u2026\n' : '')
       + grid
       + `${cause}\n`
       + site;
}
async function copyShare(){
  const text = buildShareText();
  try{
    if (navigator.clipboard && navigator.clipboard.writeText){
      await navigator.clipboard.writeText(text);
    } else {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
    }
    shareMsg = 'copied! paste in discord'; shareMsgT = time;
    sfx.coin();
  }catch(e){
    shareMsg = 'copy failed \u2014 select & copy'; shareMsgT = time;
  }
  try{ if (navigator.share) navigator.share({ text }); }catch(e){}
}

function die(cause){
  if (!player.alive) return;
  // a bell life saves you from anything except being left behind
  if (hearts > 0 && cause !== 'behind' && lastSafe){
    hearts--;
    invuln = 2;
    player.px = lastSafe.px; player.row = lastSafe.row; player.wy = lastSafe.row*CELL;
    player.onLog = null; player.hop = null;
    if (player.wy - camY < CELL*1.2) camY = Math.max(0, player.wy - CELL*1.5);
    idleT = 0; birdWarn = false;
    effects.push({kind:'hearts', x:player.px, wy:player.wy, t:0});
    effects.push({kind:'banner', text:'SAVED!', t:0, dur:1.1});
    sfx.rescue();
    return;
  }
  player.alive = false;
  deathCause = cause;
  state = 'dead';
  idleT = 0;
  if (cause==='water'){ sfx.splash(); deathAnim={kind:'sink',t:0,x:player.px,wy:player.wy}; player.visible=false; }
  else if (cause==='bird'){ sfx.swoop(); deathAnim={kind:'carried',t:0,x:player.px,wy:player.wy}; player.visible=false; }
  else { sfx.crash(); shake = 0.4; deathAnim={kind:'flat',t:0,x:player.px,wy:player.wy}; player.visible=false; }
  setTimeout(()=>{ sfx.over(); }, 350);
  setTimeout(()=>{ if(state==='dead'){
    if (boostActive && maxRow > 0){
      const boosted = Math.round(maxRow * 1.25);
      effects.push({kind:'banner', text:maxRow+' \u2192 '+boosted, t:0, dur:1.6});
      maxRow = boosted;
    }
    best = Math.max(best, maxRow);
    bank += coinsGot;
    if (dailyMode && coinsGot > 0){
      const bonus = Math.ceil(coinsGot * 0.5);
      bank += bonus;
      effects.push({kind:'banner', text:'DAILY BONUS +'+bonus, t:0, dur:1.6});
    }
    if (dailyMode){
      // lock today's daily — one run per day
      dailyDoneDate = dailyDate;
      dailyDoneScore = maxRow;
    }
    submitScore();
    saveMeta();
    const F = fb();
    if (F){
      board.rows = null;
      board.mode = dailyMode ? 'daily' : 'global';
      const fetchTop = dailyMode ? F.topDaily(dailyDate, 10) : F.top(10);
      fetchTop.then(r=>{
        board.rows=r;
        if (dailyMode){
          const idx = r.findIndex(x=>x.me);
          if (idx >= 0){
            const rank = idx+1;
            if (bestDailyRank===0 || rank < bestDailyRank){ bestDailyRank = rank; saveMeta(); }
          }
        }
      }).catch(()=>{});
    }
    state='over';
  } }, 1050);
}

/* ============================== update ============================== */
let last = performance.now();
function update(dt){
  time += dt;
  titleBob += dt;
  updateAmbient();
  if (ghostActive && ghost){
    const gp = ghostPos(time - ghostRunStart);
    ghostRowNow = gp ? gp.r : -999;
  }
  if (shake>0) shake = Math.max(0, shake-dt);
  // effects
  for (const e of effects) e.t += dt;
  effects = effects.filter(e=>e.t < (e.dur||0.8));

  if (state!=='play' && state!=='dead') return;
  if (coinsGot >= 50) unlockAch('fish50');
  if (invuln > 0) invuln = Math.max(0, invuln - dt);
  // ZOOMIES: golden-fish power-up auto-dashes the cat forward, invincible.
  // Fixed duration, then always ends on guaranteed-safe ground.
  if (zoomies > 0){
    zoomies = Math.max(0, zoomies - dt);
    zoomiesElapsed += dt;
    if (zoomiesElapsed > 5) zoomies = 0;      // absolute ceiling — can't loop
    invuln = Math.max(invuln, 0.15);
    zoomiesAuto -= dt;
    if (!player.hop && zoomiesAuto <= 0){
      const before = player.row;
      tryHop(0, 1);
      if (player.hop || player.row > before) zoomiesHops++;
      zoomiesAuto = 0.09;   // rapid-fire hops
    }
    if (zoomies === 0){
      // land the in-progress hop onto its real destination tile
      if (player.hop){
        player.px = player.hop.toPx; player.row = player.hop.toRow; player.wy = player.hop.toWy;
        player.hop = null;
      }
      player.onLog = null;
      // is the cat's current tile safe to stand on?
      const safeHere = (r)=>{
        const row = rows[r];
        if (!row) return false;
        if (row.type==='grass' || row.type==='road') return true;   // road is safe to stand between cars; invuln covers the moment
        return false;
      };
      if (!safeHere(player.row)){
        // scan backward for the nearest solid ground and drop there
        let target = null;
        for (let r=player.row; r>=firstRow; r--){ if (safeHere(r)){ target = r; break; } }
        if (target === null && lastSafe) target = lastSafe.row;
        if (target === null) target = Math.max(firstRow, player.row-1);
        player.row = target;
        player.wy = target*CELL;
        effects.push({kind:'ripple', x:player.px, wy:player.wy, t:0});
      }
      player.px = colX(clamp(Math.round((player.px-CELL/2)/CELL), PLAY_MIN, PLAY_MAX));
      invuln = Math.max(invuln, 0.8);       // generous grace window to react
      lastSafe = { row:player.row, px:player.px };
      if (zoomiesHops > 0){
        pop('x'+zoomiesHops+' ZOOM', '#ffd94d');
        if (zoomiesHops >= 12) unlockAch('zoomburst');
      }
    }
  }

  // row scrolling state
  for (let r=firstRow;r<=lastRow;r++){
    const row = rows[r]; if(!row) continue;
    if (row.type==='road' || row.type==='river'){
      row.scroll = (row.scroll||0) + row.speed*dt;
    }
    if (row.type==='zoom'){
      row.t -= dt;
      if (row.phase==='cool' && row.t<=0){ row.phase='warn'; row.t=0.85;
        const py = r*CELL - camY;
        if (py>-CELL && py<H+CELL) sfx.warn();
      }
      else if (row.phase==='warn' && row.t<=0){ row.phase='streak';
        row.catX = row.dir>0 ? -CELL*1.5 : W+CELL*1.5; }
      else if (row.phase==='streak'){
        row.catX += row.dir*row.streakSpeed*dt;
        if (row.catX < -2*CELL || row.catX > W+2*CELL){
          row.phase='cool'; row.t=rnd(1.6,4.2);
          if (rows[player.row] === row && player.alive) unlockAch('zoomer');
        }
      }
    }
  }

  if (state==='dead'){
    if (deathAnim) deathAnim.t += dt;
    // camera keeps drifting a touch for drama
    camY += creep*0.3*dt;
    ensureRows();
    return;
  }

  /* --- player hop --- */
  if (player.hop){
    const h = player.hop; h.t += dt;
    const k = Math.min(1, h.t/h.dur);
    player.px = h.fromPx + (h.toPx-h.fromPx)*k;
    player.wy = h.fromWy + (h.toWy-h.fromWy)*k;
    if (k>=1) landPlayer();
  } else if (player.onLog){
    const {row} = player.onLog;
    player.px += row.dir*row.speed*dt;
    const L = player.onLog.L;
    if (L.fish){
      const lx = logScreenX(row, L);
      if (Math.abs(player.px - lx) < 28){ L.fish=false; coinsGot += fishMult; sfx.coin(); pop('+1'); }
    }
    if (player.px < CELL*0.55 || player.px > W - CELL*0.55){ die('water'); return; }
  }

  /* --- camera --- */
  if (startedMoving){
    creep = Math.min(11 + maxRow*0.32, 36);
    camY += creep*dt;
  }
  const target = player.wy - H*0.42;
  if (target > camY) camY += (target-camY)*Math.min(1, dt*7);
  ensureRows();

  /* --- collisions --- */
  // mid-hop, count the cat as being in whichever lane it's visually closer
  // to — no more phantom hits from the row it already left
  let effRow = player.row;
  if (player.hop && player.hop.toRow !== player.row){
    const k = player.hop.t / player.hop.dur;
    if (k > 0.5) effRow = player.hop.toRow;
  }
  const prow = rows[effRow];
  if (prow){
    if (prow.type==='road' && invuln<=0){
      for (const car of prow.cars){
        const cxp = carScreenX(prow, car);
        const halfW = (car.kind==='dog'? CELL*0.62 : CELL*0.5) + CELL*0.32;
        if (Math.abs(player.px - cxp) < halfW - 16){ die(car.kind==='dog'?'dog':'roomba'); return; }
      }
    }
    if (prow.type==='zoom' && prow.phase==='streak' && invuln<=0){
      if (Math.abs(player.px - prow.catX) < CELL*0.72){ die('zoom'); return; }
    }
    if (prow.type==='river' && !player.hop && !player.onLog && zoomies<=0){ die('water'); return; }
  }

  /* --- fell off the bottom --- */
  if (player.wy - camY < CELL*0.1 && startedMoving){ die('behind'); return; }

  /* --- idle bird --- */
  if (startedMoving && !player.hop){
    idleT += dt;
    if (idleT > 4.6 && !birdWarn){ birdWarn = true; sfx.warn(); }
    if (idleT > 7){ die('bird'); return; }
  }
}

/* ============================== render ============================== */
function sy(wy){ return H - (wy - camY) - CELL; } // top of the row band
function drawSprite(img, x, wy, w, opts={}){
  const h = w * img.height / img.width;
  const yTop = sy(wy) + CELL - h + (opts.dy||0);
  cx.save();
  if (opts.alpha!==undefined) cx.globalAlpha = opts.alpha;
  if (opts.flip){
    cx.translate(x,0); cx.scale(-1,1);
    cx.drawImage(img, -w/2, yTop - (opts.lift||0), w, h);
  } else if (opts.rot){
    cx.translate(x, yTop + h/2 - (opts.lift||0));
    cx.rotate(opts.rot);
    cx.drawImage(img, -w/2, -h/2, w, h);
  } else {
    cx.drawImage(img, x-w/2, yTop - (opts.lift||0), w, h);
  }
  cx.restore();
}
function shadow(x, wy, w, lift=0){
  const y = sy(wy)+CELL-7;
  cx.save();
  cx.globalAlpha = 0.22 * Math.max(0.35, 1 - lift/40);
  cx.fillStyle = '#0a1410';
  cx.beginPath();
  cx.ellipse(x, y, w*(0.42 + lift*0.002), 8, 0, 0, Math.PI*2);
  cx.fill();
  cx.restore();
}

const GRASS_A = '#8ed05b', GRASS_B = '#82c650', GRASS_EDGE = '#5ea23c';
function drawRow(r){
  const row = rows[r]; if (!row) return;
  const y = sy(r*CELL);
  if (y > H + CELL || y < -CELL*2) return;

  if (row.type==='grass'){
    for (let c=0;c<COLS;c++){
      const light = (r + c) % 2 === 0;
      cx.fillStyle = (c===0||c===COLS-1) ? GRASS_EDGE : (light?GRASS_A:GRASS_B);
      cx.fillRect(c*CELL, y, CELL, CELL);
    }
    // blades
    cx.fillStyle = 'rgba(255,255,255,0.10)';
    for (let i=0;i<5;i++){
      const gx = ((r*97 + i*131) % (W-40)) + 20;
      const gy = y + ((r*53 + i*71) % (CELL-18)) + 8;
      cx.fillRect(gx, gy, 3, 3);
    }
  }
  else if (row.type==='road'){
    cx.fillStyle = '#494a55';
    cx.fillRect(0, y, W, CELL);
    cx.fillStyle = 'rgba(0,0,0,0.14)';
    cx.fillRect(0, y, W, 5);
    cx.fillRect(0, y+CELL-5, W, 5);
    // dashes if road continues above
    const above = rows[r+1];
    if (above && above.type==='road'){
      cx.fillStyle = 'rgba(255,255,255,0.5)';
      for (let x=10;x<W;x+=64) cx.fillRect(x, y-2, 28, 4);
    }
    // speckle
    cx.fillStyle = 'rgba(255,255,255,0.05)';
    for (let i=0;i<6;i++){
      const gx = ((r*89 + i*173) % (W-20)) + 10;
      const gy = y + ((r*37 + i*61) % (CELL-14)) + 7;
      cx.fillRect(gx, gy, 4, 2);
    }
  }
  else if (row.type==='river'){
    cx.fillStyle = '#4fb2e6';
    cx.fillRect(0, y, W, CELL);
    cx.fillStyle = 'rgba(255,255,255,0.16)';
    const off = (time * row.speed * row.dir) % 96;
    for (let x=-96;x<W+96;x+=96){
      cx.fillRect(x+off, y+14, 34, 3);
      cx.fillRect(x+off+52, y+CELL-22, 26, 3);
    }
    cx.fillStyle = 'rgba(0,40,80,0.15)';
    cx.fillRect(0, y, W, 6);
  }
  else if (row.type==='pond'){
    cx.fillStyle = '#4aa8dd';
    cx.fillRect(0, y, W, CELL);
    cx.fillStyle = 'rgba(255,255,255,0.13)';
    for (let x=20;x<W;x+=110){
      const wob = Math.sin(time*1.6 + x)*5;
      cx.fillRect(x+wob, y+18, 30, 3);
      cx.fillRect(x+55-wob, y+CELL-24, 24, 3);
    }
    cx.fillStyle = 'rgba(0,40,80,0.15)';
    cx.fillRect(0, y, W, 6);
  }
  else if (row.type==='zoom'){
    cx.fillStyle = '#d9cfbe';
    cx.fillRect(0, y, W, CELL);
    cx.fillStyle = '#c9bda8';
    for (let c=0;c<COLS;c++) if(c%2===0) cx.fillRect(c*CELL, y, CELL, CELL);
    // faint direction arrows
    cx.save(); cx.globalAlpha=0.18; cx.fillStyle='#6b5d45';
    cx.font='18px monospace'; cx.textAlign='center';
    const ar = row.dir>0 ? '\u25b6' : '\u25c0';
    for (let x=CELL;x<W;x+=CELL*2) cx.fillText(ar, x, y+CELL/2+7);
    cx.restore();
    // hazard edge stripes
    cx.fillStyle = '#e3b23c';
    for (let x=0;x<W;x+=32){ cx.fillRect(x, y, 16, 5); cx.fillRect(x+16, y+CELL-5, 16, 5); }
  }
}

function drawRowActors(r){
  const row = rows[r]; if (!row) return;
  const y = sy(r*CELL);
  if (y > H + CELL*2 || y < -CELL*2) return;
  const wy = r*CELL;

  if (row.type==='grass'){
    // coins
    if (row.coins) for (const [c,kind] of row.coins){
      const x = colX(c);
      const bob = Math.sin(time*4 + c)*3;
      if (kind==='fishC'){ shadow(x,wy,30); drawSprite(S.fishC, x, wy, 34, {lift:8+bob}); }
      if (kind==='milk'){ shadow(x,wy,30); drawSprite(S.milk, x, wy, 34, {lift:9+bob}); }
      if (kind==='yarn'){ shadow(x,wy,32); drawSprite(S.yarn, x, wy, 36, {lift:4+bob*0.5}); }
      if (kind==='bell'){
        shadow(x,wy,30);
        drawSprite(S.bell, x, wy, 34, {lift:10+bob, rot:Math.sin(time*6+c)*0.16});
        cx.save(); cx.fillStyle='#ffd94d'; cx.globalAlpha=0.5+0.5*Math.sin(time*7);
        star(x+16, sy(wy)+8, 5); cx.restore();
      }
      if (kind==='gold'){
        // golden fish — pulsing glow, sparkles
        cx.save();
        cx.globalAlpha = 0.3+0.25*Math.sin(time*6+c);
        cx.fillStyle = '#ffd94d';
        cx.beginPath(); cx.arc(x, sy(wy)+CELL-22-bob, 22, 0, Math.PI*2); cx.fill();
        cx.restore();
        cx.save();
        cx.globalAlpha = 0.9;
        // tint the fish sprite gold
        drawSprite(S.fishC, x, wy, 36, {lift:10+bob});
        cx.globalCompositeOperation='source-atop';
        cx.restore();
        cx.save(); cx.fillStyle='#fff8d0'; cx.globalAlpha=0.7+0.3*Math.sin(time*9+c);
        star(x+16, sy(wy)+6, 5); star(x-14, sy(wy)+18, 4); cx.restore();
      }
    }
    // obstacles
    if (row.tiles) for (const t of row.tiles){
      const x = colX(t.c);
      if (t.kind==='bush') drawSprite(S.bush, x, wy, 60, {dy:2});
      else { shadow(x,wy,44); drawSprite(S.scratch, x, wy, 46); }
    }
    // edge bushes
    drawSprite(S.bush, colX(0), wy, 62, {dy:2});
    drawSprite(S.bush, colX(8), wy, 62, {dy:2});
  }
  else if (row.type==='road'){
    const dark = nightAmount();
    for (const car of row.cars){
      const x = carScreenX(row, car);
      if (x < -CELL*2 || x > W+CELL*2) continue;
      if (dark > 0.12){
        // headlight cone
        cx.save();
        cx.globalAlpha = 0.28*dark;
        const hy = sy(wy)+CELL-24;
        const grad = cx.createLinearGradient(x, hy, x+row.dir*120, hy);
        grad.addColorStop(0,'rgba(255,240,160,0.9)');
        grad.addColorStop(1,'rgba(255,240,160,0)');
        cx.fillStyle = grad;
        cx.beginPath();
        cx.moveTo(x+row.dir*20, hy);
        cx.lineTo(x+row.dir*130, hy-22);
        cx.lineTo(x+row.dir*130, hy+22);
        cx.closePath(); cx.fill();
        cx.restore();
      }
      if (car.kind==='dog'){
        shadow(x, wy, 72);
        const bob = Math.abs(Math.sin(time*14 + car.x))*4;
        drawSprite(S.dog, x, wy, 78, {flip: row.dir>0, lift:bob, dy:-2});
      } else {
        shadow(x, wy, 62);
        drawSprite(roombaCache[car.v]||S.roomba, x, wy, 66, {dy:4});
        cx.save(); cx.globalAlpha=0.25; cx.fillStyle='#fff';
        cx.fillRect(x - row.dir*40, sy(wy)+CELL-16, 8, 3);
        cx.restore();
      }
    }
  }
  else if (row.type==='river'){
    for (const L of row.logs){
      const x = logScreenX(row, L);
      if (x < -L.w || x > W+L.w) continue;
      if (L.kind==='couch') drawSprite(S.couch, x, wy, L.w*1.04, {dy:6});
      else {
        for (let i=0;i<L.n;i++){
          const cxp = x - L.w/2 + CELL/2 + i*CELL;
          drawSprite(S.crate, cxp, wy, CELL*1.12, {dy:5});
        }
      }
      if (L.fish){
        const bob = Math.sin(time*4 + L.x)*3;
        drawSprite(S.fishC, x, wy, 32, {lift:22+bob});
      }
    }
  }
  else if (row.type==='pond'){
    for (const c of row.beds){
      const x = colX(c);
      const bob = Math.sin(time*1.4 + c)*1.5;
      cx.save(); cx.globalAlpha=0.2; cx.fillStyle='#063a56';
      cx.beginPath(); cx.ellipse(x, sy(wy)+CELL-8, 34, 9, 0, 0, Math.PI*2); cx.fill();
      cx.restore();
      drawSprite(S.bed, x, wy, 62, {dy:4, lift:bob});
      if (row.coins.has(c)) drawSprite(S.fishC, x, wy, 30, {lift:16+Math.sin(time*4+c)*3});
    }
  }
  else if (row.type==='zoom'){
    if (row.phase==='warn'){
      const blink = Math.floor(row.t*10)%2===0;
      if (blink){
        const x = row.dir>0 ? 26 : W-26;
        drawSprite(S.paw, x, wy, 36, {lift:14});
        cx.save(); cx.fillStyle='#e8574d'; cx.font='16px "Press Start 2P", monospace';
        cx.textAlign='center';
        cx.fillText('!', x, sy(wy)+18);
        cx.restore();
      }
    }
    if (row.phase==='streak'){
      const x = row.catX;
      // speed streaks
      cx.save(); cx.globalAlpha=0.5; cx.fillStyle='#fff';
      for (let i=1;i<=4;i++)
        cx.fillRect(x - row.dir*(30+i*24), sy(wy)+16+i*8, 22, 4);
      cx.restore();
      shadow(x, wy, 70);
      drawSprite(S.blackcat, x, wy, 76, {flip: row.dir>0, dy:-2});
    }
  }
}

function playerSprite(){
  const f = player.facing;
  const hop = player.hop;
  if (!player.alive) return {img:PS.dieFlat, flip:false};
  if (hop && (f==='left'||f==='right')) return {img:PS.jump, flip:f==='right'};
  if (f==='left')  return {img:PS.side, flip:false};
  if (f==='right') return {img:PS.side, flip:true};
  if (f==='down')  return {img:PS.down, flip:false};
  return {img:PS.up, flip:false};
}

let ghostRowNow = -999;
function drawGhost(){
  if (!ghost) return;
  const et = time - ghostRunStart;
  const pos = ghostPos(et);
  if (!pos) return;
  const gx = colX(clamp(pos.c, PLAY_MIN-0.5, PLAY_MAX+0.5));
  const gwy = pos.r * CELL;
  // gentle hop bob synced to movement
  const lift = Math.abs(Math.sin(et*7)) * 6;
  cx.save();
  cx.globalAlpha = 0.42;
  // ghost uses the leader's chosen look isn't known; use base Tibbs, tinted cool
  drawSprite(S.up, gx, gwy, 50, { lift });
  cx.restore();
  // little name tag
  cx.save();
  cx.globalAlpha = 0.7;
  cx.font = '7px "Press Start 2P", monospace';
  cx.textAlign = 'center';
  cx.fillStyle = '#8fd0ff';
  const tag = (ghost.name||'#1').slice(0,10);
  cx.fillText(tag, gx, sy(gwy) - 4);
  cx.restore();
}
function drawPlayer(){
  if (!player.visible) return;
  let lift = 0, sq = 1;
  if (player.hop){
    const k = player.hop.t/player.hop.dur;
    lift = Math.sin(Math.PI*Math.min(1,k))*24;
    sq = 1 + Math.sin(Math.PI*Math.min(1,k))*0.12;
  } else {
    lift = Math.abs(Math.sin(time*3))*1.5; // idle breathing
  }
  const {img, flip} = playerSprite();
  shadow(player.px, player.wy, 44, lift);
  const w = 52*sq;
  // zoomies aura: golden glow + trailing speed lines
  if (zoomies > 0){
    cx.save();
    cx.globalAlpha = 0.35+0.2*Math.sin(time*18);
    cx.fillStyle = '#ffd94d';
    cx.beginPath(); cx.arc(player.px, sy(player.wy)+CELL-28-lift, 30, 0, Math.PI*2); cx.fill();
    cx.restore();
    cx.save(); cx.globalAlpha=0.5; cx.strokeStyle='#fff8d0'; cx.lineWidth=3;
    for (let i=1;i<=4;i++){
      const yy = sy(player.wy)+CELL-14-lift + i*7;
      cx.beginPath(); cx.moveTo(player.px-18, yy+i*4); cx.lineTo(player.px+18, yy+i*4); cx.stroke();
    }
    cx.restore();
  }
  const flash = invuln>0 && zoomies<=0 && Math.floor(time*12)%2===0;
  drawSprite(img, player.px, player.wy, w, {flip, lift, alpha: flash?0.35:1});
  if (birdWarn && state==='play'){
    // circling bird shadow warning
    const t = time*5;
    const bx = player.px + Math.cos(t)*36, bwy = player.wy;
    cx.save(); cx.globalAlpha = 0.5 + 0.3*Math.sin(time*10);
    drawSprite(S.bird, bx, bwy, 40, {lift: 120 + Math.sin(t*1.4)*10, flip:Math.cos(t)<0, alpha:0.85});
    cx.restore();
  }
}

function drawDeath(){
  if (!deathAnim) return;
  const d = deathAnim;
  if (d.kind==='flat'){
    shadow(d.x, d.wy, 52);
    drawSprite(PS.dieFlat, d.x, d.wy, 62);
    // orbiting stars
    cx.save(); cx.fillStyle='#ffd94d';
    for (let i=0;i<3;i++){
      const a = d.t*6 + i*2.1;
      const sx = d.x + Math.cos(a)*26;
      const syy = sy(d.wy) + 14 + Math.sin(a)*7;
      star(sx, syy, 6);
    }
    cx.restore();
  }
  if (d.kind==='sink'){
    const k = Math.min(1, d.t/0.6);
    if (k<1) drawSprite(PS.hurt, d.x, d.wy, 50*(1-k*0.8), {lift:-k*18, alpha:1-k});
    cx.save(); cx.strokeStyle='rgba(255,255,255,0.8)'; cx.lineWidth=3;
    for (let i=0;i<2;i++){
      const rr = 10 + (d.t*60 + i*22) % 46;
      cx.globalAlpha = Math.max(0, 0.8 - rr/50);
      cx.beginPath(); cx.ellipse(d.x, sy(d.wy)+CELL-14, rr, rr*0.35, 0, 0, Math.PI*2); cx.stroke();
    }
    cx.restore();
  }
  if (d.kind==='carried'){
    const k = d.t;
    const lift = 30 + k*260;
    drawSprite(S.bird, d.x, d.wy, 54, {lift: lift+34});
    drawSprite(PS.hurt, d.x, d.wy, 44, {lift});
  }
}

function star(x,y,r){
  cx.beginPath();
  for (let i=0;i<10;i++){
    const a = i*Math.PI/5 - Math.PI/2;
    const rr = i%2===0 ? r : r*0.45;
    cx.lineTo(x+Math.cos(a)*rr, y+Math.sin(a)*rr);
  }
  cx.closePath(); cx.fill();
}

  for (const e of effects){
    const k = e.t/(e.dur||0.8);
    if (e.kind==='dust'){
      drawSprite(S.dust, e.x, e.wy, 30 + k*26, {alpha: 0.7*(1-k), dy:6});
    }
    if (e.kind==='hearts'){
      drawSprite(S.hearts, e.x, e.wy, 40, {alpha: 1-k, lift: 20 + k*44});

    if (e.kind==='pop'){

      cx.strokeText(e.text, e.x, py);
      cx.fillStyle=e.color;
      cx.fillText(e.text, e.x, py);
      cx.restore();
    }
    if (e.kind==='ach'){
      cx.save();
      const a = k<0.1 ? k/0.1 : k>0.85 ? (1-k)/0.15 : 1;
      const pw2 = 300, ph2 = 56, pxx = (W-pw2)/2;
      const slide = k<0.1 ? (1-k/0.1)*-70 : 0;

      cx.globalAlpha = a;
      cx.fillStyle = 'rgba(24,30,42,0.96)';
      roundRect(pxx, yy, pw2, ph2, 12); cx.fill();

      cx.textAlign='left';
      cx.fillStyle='#ffd94d'; cx.font='10px "Press Start 2P", monospace';
      cx.fillText('\u2605 ACHIEVEMENT', pxx+18, yy+22);
      cx.fillStyle='#fff'; cx.font='11px "Press Start 2P", monospace';
      cx.fillText(e.text, pxx+18, yy+42);
      cx.textAlign='right';
      cx.fillStyle='#7ec850'; cx.font='11px "Press Start 2P", monospace';
      cx.fillText('+'+e.reward+'\u{1F41F}', pxx+pw2-16, yy+34);
      cx.restore();
    }
    if (e.kind==='banner'){
      cx.save();
      const a = k<0.15 ? k/0.15 : k>0.8 ? (1-k)/0.2 : 1;
      cx.globalAlpha = a;
      cx.font='26px "Press Start 2P", monospace'; cx.textAlign='center';
      cx.lineWidth=8; cx.strokeStyle='rgba(20,26,36,0.9)';
      const yy = H*0.3 - k*14;
      cx.strokeText(e.text, W/2, yy);
      cx.fillStyle='#ffd94d';
      cx.fillText(e.text, W/2, yy);
      cx.restore();
    }
    if (e.kind==='stars'){
      cx.save(); cx.fillStyle='#ffd94d'; cx.globalAlpha = 1-k;
      for (let i=0;i<4;i++){
        const a = i*1.7 + e.t*3;
        star(e.x + Math.cos(a)*(10+k*26), sy(e.wy)+20 - k*30 + Math.sin(a)*8, 5);
      }
      cx.restore();
    }
    if (e.kind==='bonk'){
      cx.save(); cx.fillStyle='#fff'; cx.globalAlpha = (1-k)*0.9;
      cx.font='14px "Press Start 2P", monospace'; cx.textAlign='center';
      cx.fillText('boop', e.x, sy(e.wy)+8 - k*14);
      cx.restore();
    }
    if (e.kind==='ripple'){
      cx.save(); cx.strokeStyle='rgba(255,255,255,0.7)'; cx.lineWidth=2;
      cx.globalAlpha = 1-k;
      cx.beginPath(); cx.ellipse(e.x, sy(e.wy)+CELL-12, 12+k*20, (12+k*20)*0.35, 0,0,Math.PI*2); cx.stroke();
      cx.restore();
    }
  }
}

/* ---- day / night cycle ---- */
function cyclePos(){ return ((maxRow % 80) + 80) % 80 / 80; }  // 0..1 over 80 rows
function nightAmount(){
  const p = cyclePos();
  // day 0-.40, dusk .40-.52, night .52-.88, dawn .88-1
  if (p < 0.40) return 0;
  if (p < 0.52) return (p-0.40)/0.12;
  if (p < 0.88) return 1;
  return 1 - (p-0.88)/0.12;
}
function duskAmount(){
  const p = cyclePos();
  const b1 = Math.max(0, 1 - Math.abs(p-0.46)/0.09);
  const b2 = Math.max(0, 1 - Math.abs(p-0.93)/0.08);
  return Math.max(b1,b2);
}
function drawSkyMood(){
  const night = nightAmount(), dusk = duskAmount();
  if (dusk>0){
    cx.fillStyle = `rgba(255,120,50,${0.13*dusk})`;
    cx.fillRect(0,0,W,H);
  }
  if (night>0){
    cx.fillStyle = `rgba(10,18,55,${0.34*night})`;
    cx.fillRect(0,0,W,H);
    // stars
    cx.save(); cx.globalAlpha = 0.6*night;
    cx.fillStyle='#fff';
    for (let i=0;i<12;i++){
      const sxx = (i*197 + 61) % W;
      const syy = (i*139 + 37) % (H*0.5);
      const tw = 0.4+0.6*Math.abs(Math.sin(time*1.5+i*2));
      cx.globalAlpha = 0.6*night*tw;
      cx.fillRect(sxx, syy, 2, 2);
    }
    cx.restore();
  }
}
const clouds = [ {x:80, y:90, s:2.6, v:9}, {x:380, y:250, s:3.4, v:6}, {x:200, y:520, s:2.2, v:12} ];
function drawClouds(){
  cx.save();
  for (const c of clouds){
    c.x += c.v * 0.016;
    if (c.x > W + 120) c.x = -120;
    cx.globalAlpha = 0.13;
    const w = 42*c.s, h = w*S.dust.height/S.dust.width;
    cx.drawImage(S.dust, c.x-w/2, c.y-h/2, w, h);
  }
  cx.restore();
}

function drawRain(){
  const amt = rainAmount();
  if (amt <= 0) return;
  cx.save();
  cx.fillStyle = `rgba(50,70,110,${0.1*amt})`;
  cx.fillRect(0,0,W,H);
  cx.strokeStyle = `rgba(205,228,255,${0.5*amt})`;
  cx.lineWidth = 2.5;
  const n = Math.floor(46*amt);
  const fall = (time*640) % H;
  cx.beginPath();
  for (let i=0;i<n;i++){
    const bx = (i*163 + 41) % (W+120) - 60;
    const by = ((i*97 + fall + i*i*13) % (H+40)) - 20;
    cx.moveTo(bx, by);
    cx.lineTo(bx-7, by+16);
  }
  cx.stroke();
  cx.restore();
}

/* ---- HUD ---- */
function chip(x, y, w, h){
  cx.fillStyle = 'rgba(20,26,36,0.72)';
  roundRect(x, y, w, h, 12); cx.fill();
}
function roundRect(x,y,w,h,r){
  cx.beginPath();
  cx.moveTo(x+r,y); cx.arcTo(x+w,y,x+w,y+h,r); cx.arcTo(x+w,y+h,x,y+h,r);
  cx.arcTo(x,y+h,x,y,r); cx.arcTo(x,y,x+w,y,r); cx.closePath();
}
function wrapText(text, cxpos, y, maxW, lh){
  const words = String(text).split(' ');
  let line = '', lines = [];
  for (const w of words){
    const test = line ? line+' '+w : w;
    if (cx.measureText(test).width > maxW && line){ lines.push(line); line = w; }
    else line = test;
  }
  if (line) lines.push(line);
  const startY = y - (lines.length-1)*lh/2;
  lines.forEach((l,i)=> cx.fillText(l, cxpos, startY + i*lh));
}
function drawHUD(){
  // fish count
  chip(10, 10, 118, 40);
  cx.drawImage(S.fishI, 20, 17, 26, 26);
  cx.fillStyle = '#fff'; cx.font = '16px "Press Start 2P", monospace';
  cx.textAlign='left'; cx.textBaseline='middle';
  cx.fillText(String(coinsGot), 56, 32);
  // hearts (bell lives)
  if (hearts > 0){
    chip(10, 56, 24 + hearts*30, 36);
    for (let i=0;i<hearts;i++) cx.drawImage(S.heart, 20+i*30, 62, 24, 24);
  }
  // score
  cx.save();
  cx.font = '30px "Press Start 2P", monospace';
  cx.textAlign='center';
  cx.lineWidth = 6; cx.strokeStyle='rgba(20,26,36,0.85)';
  cx.strokeText(String(maxRow), W/2, 40);
  cx.fillStyle = '#fff';
  cx.fillText(String(maxRow), W/2, 40);
  cx.restore();
  if (dailyMode){
    cx.save();
    cx.textAlign='center'; cx.font='9px "Press Start 2P", monospace';
    cx.fillStyle='#e8574d';
    cx.fillText('\u2600 DAILY', W/2, 58);
    if (ghostActive && ghost){
      const gp = ghostPos(time - ghostRunStart);
      if (gp){
        const lead = maxRow - Math.round(gp.r);   // +ve = you're ahead of the ghost
        cx.font='8px "Press Start 2P", monospace';
        if (lead >= 0){ cx.fillStyle='#7ec850'; cx.fillText('\u{1F47B} +'+lead+' ahead', W/2, 72); }
        else { cx.fillStyle='#ff9d3c'; cx.fillText('\u{1F47B} '+lead+' behind', W/2, 72); }
      }
    }
    cx.restore();
  }
  // best
  if (best>0){
    chip(W-128, 10, 118, 40);
    cx.fillStyle = '#ffd94d'; cx.font='12px "Press Start 2P", monospace';
    cx.textAlign='left';
    cx.fillText('BEST ' + best, W-116, 32);
  }
  // pause + mute buttons (48px — proper touch targets)
  chip(W-108, 58, 48, 48);
  cx.drawImage(S.pause, W-99, 67, 30, 30);
  btnRects.pause = {x:W-108, y:58, w:48, h:48};
  chip(W-56, 58, 48, 48);
  cx.font='20px "Press Start 2P", monospace'; cx.textAlign='center';
  cx.fillStyle = muted ? 'rgba(255,255,255,0.35)' : '#7ec850';
  cx.fillText('\u266a', W-32, 84);
  if (muted){
    cx.strokeStyle='rgba(255,109,138,0.9)'; cx.lineWidth=3;
    cx.beginPath(); cx.moveTo(W-48,98); cx.lineTo(W-16,70); cx.stroke();
  }
  btnRects.mute = {x:W-56, y:58, w:48, h:48};
  cx.textBaseline='alphabetic';

function drawTitle(){
  cx.fillStyle = 'rgba(12,17,26,0.45)';

  cx.fillText('TIBBSLE', W/2, cy);
  cx.font='16px "Press Start 2P", monospace';
  cx.lineWidth=6; cx.strokeText('~ daily cat ~', W/2, cy+36);
  cx.fillStyle='#fff';
  cx.fillText('~ daily cat ~', W/2, cy+36);
  // paw prints
  cx.drawImage(S.paw, W/2-170, cy-46, 30, 30);
  cx.drawImage(S.paw, W/2+140, cy-46, 30, 30);
  // fish bank
  chip(10, 10, 128, 40);
  cx.drawImage(S.fishI, 20, 17, 26, 26);
  cx.fillStyle = '#ffd94d'; cx.font='14px "Press Start 2P", monospace';
  cx.textAlign='left'; cx.textBaseline='middle';
  cx.fillText(String(bank), 56, 32);
  // daily streak chip
  if (dayStreak > 0){
    const sw = 92;
    chip(W-10-sw, 10, sw, 40);
    cx.font='16px "Press Start 2P", monospace'; cx.fillStyle='#ff9d3c';
    cx.fillText('\u{1F525}', W-10-sw+12, 32);
    cx.fillStyle='#fff'; cx.font='13px "Press Start 2P", monospace';
    cx.fillText(String(dayStreak), W-10-sw+44, 32);
  }
  cx.textBaseline='alphabetic'; cx.textAlign='center';
  /* ---- character carousel ---- */
  const ch = CHARS[selChar];
  const isUnlocked = !!unlocked[ch.id];
  const skin = skinOf(selChar);
  const catY = H*0.50;
  const bob = Math.abs(Math.sin(titleBob*3))*10;
  /* ---- living lawn props (behind the cat) ---- */
  cx.save();
  cx.globalAlpha = 0.9;
  // cat tower, left of the carousel
  if (S.tower){
    const tw2 = 92, th2 = tw2*S.tower.height/S.tower.width;
    cx.drawImage(S.tower, 40, catY+58-th2, tw2, th2);
  }
  // food bowl on the right
  if (S.bowlPink){
    const bw4 = 44, bh4 = bw4*S.bowlPink.height/S.bowlPink.width;
    cx.drawImage(S.bowlPink, W-96, catY+58-bh4, bw4, bh4);
  }
  // sleeping tibbs curled by the tower, breathing gently
  if (S.sleepZ){
    const sw2 = 56, sh2 = sw2*S.sleepZ.height/S.sleepZ.width;
    const breathe = 1 + Math.sin(titleBob*1.4)*0.02;
    cx.drawImage(S.sleepZ, 118, catY+58-sh2*breathe, sw2, sh2*breathe);
  }
  // box cat peeking, bottom right corner of the lawn
  if (S.boxCat){
    const bw5 = 52, bh5 = bw5*S.boxCat.height/S.boxCat.width;
    cx.drawImage(S.boxCat, W-64, catY+140-bh5, bw5, bh5);
  }
  // faint paw trail wandering under the title
  if (S.pawTrail){
    cx.globalAlpha = 0.28;
    const pw3 = 170, ph3 = pw3*S.pawTrail.height/S.pawTrail.width;
    cx.drawImage(S.pawTrail, W/2-pw3/2 + Math.sin(titleBob*0.3)*8, catY-142, pw3, ph3);
  }
  cx.restore();
  // arrows
  for (const [dir,ax] of [[-1, W/2-138],[1, W/2+98]]){
    const r = {x:ax, y:catY-14, w:40, h:56};
    btnRects[dir<0?'charL':'charR'] = r;
    cx.fillStyle='rgba(24,30,42,0.8)';
    roundRect(r.x, r.y, r.w, r.h, 10); cx.fill();
    cx.fillStyle='#ffd94d'; cx.font='18px "Press Start 2P", monospace';
    cx.textBaseline='middle';
    cx.fillText(dir<0?'\u25c0':'\u25b6', r.x+r.w/2, r.y+r.h/2+1);
    cx.textBaseline='alphabetic';
  }
  cx.save();
  cx.globalAlpha=0.25; cx.fillStyle='#000';
  cx.beginPath(); cx.ellipse(W/2, catY+62, 40, 9, 0, 0, Math.PI*2); cx.fill();
  cx.restore();
  /* ---- idle animation cycle: sit -> groom -> sit -> stretch -> yawn ---- */
  // 12s loop; keeps the star cat alive without being frantic
  const cyc = titleBob % 12;
  let img, idleBob = bob;
  if (!isUnlocked) img = skin.happy;
  else if (cyc < 4.0){ img = Math.sin(titleBob*1.2)>0.6 ? skin.meow : skin.happy; }
  else if (cyc < 6.4){ img = (Math.floor(titleBob*2.2)%2===0 ? skin.groomA : skin.groomB) || skin.happy; idleBob = 0; }
  else if (cyc < 8.6){ img = skin.happy; }
  else if (cyc < 10.4){ img = skin.stretch2 || skin.happy; idleBob = 0; }
  else { img = skin.yawn || skin.happy; idleBob = Math.abs(Math.sin(titleBob*6))*3; }
  const iw = img===skin.stretch2 ? 118 : 96, ih = iw*img.height/img.width;
  cx.save();
  if (!isUnlocked) cx.filter = 'brightness(0.35)';
  cx.drawImage(img, W/2-iw/2, catY+58-ih-idleBob, iw, ih);
  cx.restore();
  if (!isUnlocked){
    cx.font='24px "Press Start 2P", monospace'; cx.fillStyle='rgba(255,255,255,0.9)';
    cx.fillText('?', W/2, catY+20-idleBob);
  }
  // name + dots
  const showName = (ch.secret && !isUnlocked) ? '???' : ch.name;
  cx.font='13px "Press Start 2P", monospace';
  cx.lineWidth=5; cx.strokeStyle='#1b2029';
  cx.strokeText(showName, W/2, catY+92);
  cx.fillStyle = isUnlocked ? (ch.id==='gold' ? '#ffd94d' : '#fff') : '#9fb2cc';
  cx.fillText(showName, W/2, catY+92);
  for (let i=0;i<CHARS.length;i++){
    cx.fillStyle = i===selChar ? '#ffd94d' : 'rgba(255,255,255,0.3)';
    cx.beginPath(); cx.arc(W/2 + (i-(CHARS.length-1)/2)*20, catY+112, 4, 0, Math.PI*2); cx.fill();
  }
  /* ---- prompt or unlock ---- */
  btnRects.unlock = null;
  if (isUnlocked){
    const pulse = 0.6+0.4*Math.sin(titleBob*5);
    cx.globalAlpha = pulse;
    cx.font='15px "Press Start 2P", monospace';
    cx.fillStyle='#fff';
    cx.fillText('tap or press \u2191 to hop', W/2, H*0.70+14);
    cx.globalAlpha = 1;
  } else if (ch.secret){
    cx.font='10px "Press Start 2P", monospace';
    cx.fillStyle='rgba(255,217,77,0.8)';
    cx.fillText('secret cat \u00b7 loves couches', W/2, H*0.70+14);
  } else {
    const afford = bank >= ch.cost;
    const bw2=280, bh2=46, bx2=(W-bw2)/2, by2=H*0.70-16;
    btnRects.unlock = {x:bx2,y:by2,w:bw2,h:bh2};
    cx.fillStyle = afford ? '#7ec850' : 'rgba(255,255,255,0.12)';
    roundRect(bx2,by2,bw2,bh2,12); cx.fill();
    cx.drawImage(S.fishI, bx2+18, by2+11, 24, 24);
    cx.fillStyle = afford ? '#173015' : 'rgba(255,255,255,0.55)';
    cx.font='13px "Press Start 2P", monospace'; cx.textBaseline='middle';
    cx.fillText(afford ? ch.cost+'  UNLOCK' : ch.cost+'  FISH NEEDED', W/2+12, by2+bh2/2+1);
    cx.textBaseline='alphabetic';
  }
  cx.font='9px "Press Start 2P", monospace';
  cx.fillStyle='rgba(255,255,255,0.65)';
  cx.fillText('swipe / arrows / WASD \u00b7 dodge roombas \u00b7 eat fish', W/2, H*0.70+40);
  // daily run button
  const dw=300, dh=48, dxx=(W-dw)/2, dyy=H*0.755;

  const locked = dailyLocked();

    roundRect(dxx,dyy,dw,dh,12); cx.fill();
    cx.fillStyle='#7ec850'; cx.font='13px "Press Start 2P", monospace';
    cx.fillText('\u2713 DAILY DONE \u00b7 '+dailyDoneScore, W/2, dyy+dh/2-4);
    cx.font='7px "Press Start 2P", monospace';
    cx.fillStyle='rgba(255,255,255,0.65)';
    cx.fillText('come back tomorrow \u00b7 tap for board', W/2, dyy+dh-6);
  } else {
    const dp = 0.85+0.15*Math.sin(titleBob*4);
    cx.fillStyle=`rgba(232,87,77,${dp})`;
    roundRect(dxx,dyy,dw,dh,12); cx.fill();
    cx.fillStyle='#fff'; cx.font='13px "Press Start 2P", monospace';
    cx.fillText('\u2600 DAILY RUN', W/2, dyy+dh/2+1);
    cx.font='7px "Press Start 2P", monospace';
    cx.fillStyle='rgba(255,255,255,0.8)';

  cx.textBaseline='alphabetic';
  // leaderboard + shop + name buttons
  const bw=240, bh=50, gapB=14, by=dyy+dh+12;

  cx.fillStyle='#ffd94d'; cx.font='11px "Press Start 2P", monospace';
  cx.textBaseline='middle';
  cx.fillText('\u2605 LEADERBOARD', bx1+bw/2, by+bh/2+1);
  btnRects.shop = {x:bx2, y:by, w:bw, h:bh};
  cx.fillStyle='rgba(24,30,42,0.9)';
  roundRect(bx2,by,bw,bh,12); cx.fill();
  cx.strokeStyle='rgba(126,200,80,0.55)'; cx.lineWidth=2;
  roundRect(bx2,by,bw,bh,12); cx.stroke();
  cx.fillStyle='#7ec850';
  cx.fillText('SHOP', bx2+bw/2+10, by+bh/2+1);
  cx.drawImage(S.fishI, bx2+bw/2-52, by+bh/2-12, 24, 24);
  const nOwned = (items.life|0)+(items.dblfish|0)+(items.boost|0);

    cx.fillStyle='#ff9d3c'; cx.font='10px "Press Start 2P", monospace';

  }
  // buttons
  const bw=250, bh=52, bx=(W-bw)/2, by=py+ph-(dailyMode?176:130);

  cx.fillStyle='#173015'; cx.font='16px "Press Start 2P", monospace';
  cx.textBaseline='middle';
  cx.fillText('HOP AGAIN', W/2, by+bh/2+1);

  // SHARE — daily only (Wordle-style card to clipboard)

  if (dailyMode){
    btnRects.overShare = {x:bx, y:b2y, w:bw, h:44};

  }

    cx.fillText(shareMsg, W/2, py+ph+18);

let overBtn = null;

function render(){
  cx.save();
  if (shake>0) cx.translate(rnd(-1,1)*shake*14, rnd(-1,1)*shake*14);
  // sky beyond generated rows
  cx.fillStyle = '#78c24a';
  cx.fillRect(0,0,W,H);
  for (let r=lastRow;r>=firstRow;r--) drawRow(r);
  // actors far-to-near so overlaps look right
  for (let r=lastRow;r>=firstRow;r--){
    drawRowActors(r);
    if (ghostActive && (state==='play'||state==='dead') && Math.round(ghostRowNow)===r) drawGhost();
    if (player.row === r && state!=='over') drawPlayer();
    if (deathAnim && Math.round(deathAnim.wy/CELL)===r) drawDeath();
  }
  drawEffects();
  cx.restore();
  drawSkyMood();
  drawRain();
  drawClouds();
  // subtle vignette
  const vg = cx.createRadialGradient(W/2,H/2, H*0.35, W/2,H/2, H*0.75);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(8,12,20,0.28)');
  cx.fillStyle = vg; cx.fillRect(0,0,W,H);

  if (state==='title') drawTitle();
  else if (state!=='board' && state!=='shop' && state!=='achv') drawHUD();
  if (state==='pause') drawPause();
  if (state==='over') drawOver();
  if (state==='board') drawBoard();
  if (state==='shop') drawShop();
  if (state==='achv') drawAchievements();
}

/* ============================== loop ============================== */
function frame(now){
  const dt = Math.min(0.05, (now-last)/1000);
  last = now;
  if (loaded >= total){
    if (roombaCache.length===0 && S.roomba.complete) makeRoombas();
    if (!skinsBuilt) buildSkins();
    if (!metaApplied && window.FB && window.FB.metaLoaded){
      metaApplied = true;
      const m = window.FB.meta || {};
      bank = Math.max(bank, m.bank||0);
      if (Array.isArray(m.chars)) for (const id of m.chars) unlocked[id] = true;
      const idx = CHARS.findIndex(c=>c.id===m.sel);
      if (idx >= 0 && unlocked[CHARS[idx].id]) selectChar(idx);
      if (m.items) for (const k of Object.keys(items)) items[k] = Math.max(items[k]|0, m.items[k]|0);
      if (Array.isArray(m.achieved)) for (const id of m.achieved) achieved[id] = true;
      dayStreak = Math.max(dayStreak, m.dayStreak||0);
      bestDayStreak = Math.max(bestDayStreak, m.bestDayStreak||0);
      bestDailyRank = m.bestDailyRank || bestDailyRank;
      if (m.lastDailyDate) lastDailyDate = m.lastDailyDate;
      if (m.dailyDoneDate){ dailyDoneDate = m.dailyDoneDate; dailyDoneScore = m.dailyDoneScore||0; }
    }
    update(dt);
    render();
  } else {
    cx.fillStyle='#151a23'; cx.fillRect(0,0,W,H);
    cx.fillStyle='#fff'; cx.font='14px monospace'; cx.textAlign='center';
    cx.fillText('loading Mr Tibbs...', W/2, H/2);
  }
  requestAnimationFrame(frame);
}

function startPlay(daily){
  const wasDaily = dailyMode;
  if (daily !== undefined) dailyMode = !!daily;
  if (dailyMode) dailyDate = todayStr();
  audio();
  // load the day's #1 ghost on a fresh daily entry (not on every retry re-fetch)
  if (dailyMode && daily === true){
    const F = fb();
    ghost = null; ghostActive = false;
    if (F){
      const forDate = dailyDate;
      F.dailyGhost(forDate).then(g=>{
        // only apply if we're still racing this same daily run
        if (g && g.frames && g.frames.length && dailyMode && state==='play' && dailyDate===forDate){
          ghost = g;
          ghostActive = true;
        }
      }).catch(()=>{ ghost = null; });
    }
  }
  if (!dailyMode) { ghost = null; ghostActive = false; }
  resetGame();
  submitted = false;
  consumeBoosts();
  // count the daily toward the streak only on a fresh entry from the menu,
  // not on a "hop again" retry of the same day
  if (dailyMode && daily === true) registerDailyPlayed();
  state = 'play';
}

/* ============================== input ============================== */
addEventListener('keydown', e=>{
  if (document.getElementById('ovl').style.display==='flex'){
    if (e.key==='Escape') document.getElementById('ovl').style.display='none';
    if (e.key==='Enter') document.getElementById('saveNameBtn').click();
    return;
  }
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  audio();
  if (e.key==='m'||e.key==='M'){ muted = !muted; return; }
  if (state==='pause'){ if (e.key==='p'||e.key==='P'||e.key==='Escape'||e.key===' ') state='play'; return; }
  if (state==='play' && (e.key==='p'||e.key==='P'||e.key==='Escape')){ state='pause'; return; }
  if (state==='board'){ if (e.key==='Escape'||e.key==='Enter'||e.key===' ') state = prevState; return; }
  if (state==='shop'){ if (e.key==='Escape'||e.key==='Enter'||e.key===' ') state = 'title'; return; }
  if (state==='achv'){ if (e.key==='Escape'||e.key==='Enter'||e.key===' ') state = 'title'; return; }
  if (state==='over'){
    if (e.key===' '||e.key==='Enter'||e.key==='ArrowUp'){
      if (dailyMode && dailyLocked()){ dailyMode = false; state = 'title'; }
      else startPlay();
    }
    if (e.key==='l'||e.key==='L') openBoard('over', dailyMode ? 'daily' : 'global');
    if ((e.key==='s'||e.key==='S') && dailyMode) copyShare();
    return;
  }
  if (state==='title'){
    if (e.key==='l'||e.key==='L'){ openBoard('title'); return; }
    if (e.key==='ArrowLeft'||e.key==='a'||e.key==='A'){ selectChar(selChar-1); sfx.hop(); return; }
    if (e.key==='ArrowRight'||e.key==='d'||e.key==='D'){ selectChar(selChar+1); sfx.hop(); return; }
    if (!unlocked[CHARS[selChar].id]){
      if (e.key==='Enter'||e.key===' '||e.key==='ArrowUp') tryUnlock();
      return;
    }
    startPlay(false); return;
  }
  switch(e.key){
    case 'ArrowUp': case 'w': case 'W': case ' ': tryHop(0,1); break;
    case 'ArrowDown': case 's': case 'S': tryHop(0,-1); break;
    case 'ArrowLeft': case 'a': case 'A': tryHop(-1,0); break;
    case 'ArrowRight': case 'd': case 'D': tryHop(1,0); break;
  }
});

let touchStart = null;
// generous touch padding: fingers are ~40px, buttons get an invisible halo
const inRect = (x,y,r,pad=12)=> r && x>r.x-pad && x<r.x+r.w+pad && y>r.y-pad && y<r.y+r.h+pad;
// map a screen pointer to canvas coordinates, correcting for any CSS
// rounding / letterboxing so button hitboxes line up with what's drawn
function toCanvas(e){
  const rect = cv.getBoundingClientRect();
  const scale = Math.min(rect.width / W, rect.height / H);
  const drawnW = W * scale, drawnH = H * scale;
  const offX = (rect.width  - drawnW) / 2;
  const offY = (rect.height - drawnH) / 2;
  return {
    x: (e.clientX - rect.left - offX) / scale,
    y: (e.clientY - rect.top  - offY) / scale,
  };
}
cv.addEventListener('pointerdown', e=>{
  audio();
  const {x, y} = toCanvas(e);
  if (state==='board'){
    if (inRect(x,y,btnRects.boardTab)){
      const next = board.mode==='global' ? 'daily' : board.mode==='daily' ? 'weekly' : 'global';
      openBoard(prevState, next);
      return;
    }
    if (inRect(x,y,btnRects.back)) state = prevState;
    return;
  }
  if (state==='shop'){
    for (const it of SHOP_ITEMS){
      if (inRect(x,y,btnRects['buy_'+it.id])){ buyItem(it.id); return; }
    }
    if (inRect(x,y,btnRects.shopBack)) state = 'title';
    return;
  }
  if (state==='achv'){
    if (inRect(x,y,btnRects.achvBack)) state = 'title';
    return;
  }
  if (state==='pause'){
    if (inRect(x,y,btnRects.mute)){ muted=!muted; return; }
    state='play'; return;
  }
  if (state==='play'){
    if (inRect(x,y,btnRects.pause)){ state='pause'; return; }
    if (inRect(x,y,btnRects.mute)){ muted=!muted; return; }
  }
  if (state==='over'){
    if (inRect(x,y,overBtn)){
      if (dailyMode && dailyLocked()){ dailyMode = false; state = 'title'; }  // no daily replays
      else startPlay();                                                        // same mode again
    }
    else if (btnRects.overShare && inRect(x,y,btnRects.overShare)) copyShare();
    else if (inRect(x,y,btnRects.overBoard)) openBoard('over', dailyMode ? 'daily' : 'global');
    else if (inRect(x,y,btnRects.overMenu)){ dailyMode = false; state = 'title'; }
    return;
  }
  if (state==='title'){
    if (inRect(x,y,btnRects.daily)){
      if (dailyLocked()) openBoard('title', 'daily');   // already played — show today's board
      else startPlay(true);
      return;
    }
    if (inRect(x,y,btnRects.board)){ openBoard('title'); return; }
    if (inRect(x,y,btnRects.shop)){ state = 'shop'; return; }
    if (inRect(x,y,btnRects.achv)){ state = 'achv'; return; }
    if (inRect(x,y,btnRects.name)){ openNameOverlay(); return; }
    if (inRect(x,y,btnRects.charL)){ selectChar(selChar-1); sfx.hop(); return; }
    if (inRect(x,y,btnRects.charR)){ selectChar(selChar+1); sfx.hop(); return; }
    if (btnRects.unlock && inRect(x,y,btnRects.unlock)){ tryUnlock(); return; }
    if (!unlocked[CHARS[selChar].id]) return;   // locked cat can't start
    startPlay(false); return;
  }
  touchStart = {x:e.clientX, y:e.clientY, t:performance.now()};
});
cv.addEventListener('pointerup', e=>{
  if (!touchStart) return;
  const dx = e.clientX - touchStart.x;
  const dy = e.clientY - touchStart.y;
  const dist = Math.hypot(dx,dy);
  if (dist < 22){ tryHop(0,1); }              // tap = forward
  else if (Math.abs(dx) > Math.abs(dy)) tryHop(dx>0?1:-1, 0);
  else tryHop(0, dy<0?1:-1);
  touchStart = null;
});
cv.addEventListener('pointercancel', ()=>touchStart=null);

state = 'title';
resetGame();
requestAnimationFrame(frame);
</script>

<script type="module">

const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyAt17fLpjTomxDMp5kJCiT-aKHjeex82Rs",
  authDomain:        "tibs-37fc2.firebaseapp.com",
  projectId:         "tibs-37fc2",

};

const CONFIGURED = !String(FIREBASE_CONFIG.apiKey).startsWith('PASTE');
window.FB = { configured:false, ready:false, uid:null, name:null, isAnon:true,
              metaLoaded:false, meta:null, offlineReason:null,

              async setName(){}, async submit(){}, async top(){ return []; },
              async saveMeta(){}, async submitDaily(){}, async topDaily(){ return []; },

              async dailyGhost(){ return null; } };

// Firebase Auth + Google sign-in refuse to run from a file:// page
// (origin is "null"). Detect that early and report it clearly.
if (location.protocol === 'file:'){
  window.FB.offlineReason = 'Open the game from a web address (http/https), not a file on disk — Firebase blocks file:// pages.';
  console.warn('[MrTibbs] ' + window.FB.offlineReason);
}

if (CONFIGURED && location.protocol !== 'file:') try {
  const V = '10.12.2';
  const [{ initializeApp }, A, F] = await Promise.all([
    import(`https://www.gstatic.com/firebasejs/${V}/firebase-app.js`),
    import(`https://www.gstatic.com/firebasejs/${V}/firebase-auth.js`),
    import(`https://www.gstatic.com/firebasejs/${V}/firebase-firestore.js`),
  ]);
  const app  = initializeApp(FIREBASE_CONFIG);
  const auth = A.getAuth(app);
  const db   = F.getFirestore(app);
  const FB   = window.FB;
  FB.configured = true;
  let serverBest = 0;

  const myDoc = () => F.doc(db, 'scores', FB.uid);
  const defaultName = () => 'Tibbs#' + String(Math.floor(1000 + Math.random()*9000));

  A.onAuthStateChanged(auth, async user => {
    if (!user){ A.signInAnonymously(auth).catch(()=>{}); return; }
    FB.uid = user.uid;
    FB.isAnon = user.isAnonymous;
    try {
      const snap = await F.getDoc(myDoc());
      if (snap.exists()){
        const d = snap.data();
        FB.name = d.name || FB.name;
        serverBest = d.score || 0;
        FB.meta = { bank: d.bank||0, chars: d.chars||null, sel: d.sel||'tibbs', items: d.items||null,
                    achieved: d.achieved||null, dayStreak: d.dayStreak||0, bestDayStreak: d.bestDayStreak||0,
                    lastDailyDate: d.lastDailyDate||null, bestDailyRank: d.bestDailyRank||0,
                    dailyDoneDate: d.dailyDoneDate||null, dailyDoneScore: d.dailyDoneScore||0 };
      } else {
        FB.meta = { bank:0, chars:null, sel:'tibbs' };
      }
    } catch(e){ FB.meta = { bank:0, chars:null, sel:'tibbs' }; }
    if (!FB.name) FB.name = (user.displayName || '').slice(0,12) || defaultName();
    FB.metaLoaded = true;
    FB.ready = true;
  });

  FB.saveMeta = async (m) => {
    if (!FB.uid || !m) return;
    await F.setDoc(myDoc(), {
      name: FB.name || defaultName(),
      score: serverBest,
      bank: Math.max(0, Math.floor(m.bank)||0),
      chars: m.chars, sel: m.sel,
      items: m.items || {},
      achieved: m.achieved || [],
      dayStreak: m.dayStreak||0,
      bestDayStreak: m.bestDayStreak||0,
      lastDailyDate: m.lastDailyDate||null,
      bestDailyRank: m.bestDailyRank||0,
      dailyDoneDate: m.dailyDoneDate||null,
      dailyDoneScore: m.dailyDoneScore||0,
      updatedAt: F.serverTimestamp(),
    }, { merge:true });
  };

  FB.setName = async (n) => {
    n = String(n).replace(/[^\w \-!.]/g,'').trim().slice(0,12);
    if (!n) return;
    FB.name = n;
    if (!FB.uid) return;
    await F.setDoc(myDoc(), { name:n, score:serverBest, updatedAt:F.serverTimestamp() }, { merge:true });
  };

  FB.submit = async (score, fish) => {
    if (!FB.uid || !(score > serverBest)) return;
    serverBest = score;
    await F.setDoc(myDoc(), {
      name: FB.name || defaultName(),
      score, fish: fish||0,
      updatedAt: F.serverTimestamp(),
    }, { merge:true });
  };

  FB.top = async (n=10) => {
    const q = F.query(F.collection(db,'scores'), F.orderBy('score','desc'), F.limit(n));
    const snap = await F.getDocs(q);
    return snap.docs.map(d => ({ name:d.data().name, score:d.data().score||0, me: d.id===FB.uid }));
  };

  /* ---- daily leaderboard: /daily/{date}/scores/{uid} ---- */
  let dailyBestLocal = {};
  FB.submitDaily = async (date, score, ghostFrames) => {
    if (!FB.uid || !date) return;
    if (!(score > (dailyBestLocal[date]||0))) return;
    dailyBestLocal[date] = score;
    const doc = {
      name: FB.name || defaultName(),
      score,
      updatedAt: F.serverTimestamp(),
    };
    // attach a compact ghost trail (cap length to stay tiny)
    if (Array.isArray(ghostFrames) && ghostFrames.length){
      doc.ghost = JSON.stringify(ghostFrames.slice(0, 400));
    }
    await F.setDoc(F.doc(db, 'daily', date, 'scores', FB.uid), doc, { merge:true });
  };
  FB.topDaily = async (date, n=10) => {
    const q = F.query(F.collection(db,'daily',date,'scores'), F.orderBy('score','desc'), F.limit(n));
    const snap = await F.getDocs(q);
    return snap.docs.map(d => ({ name:d.data().name, score:d.data().score||0, me: d.id===FB.uid }));
  };
  // fetch the #1 run's ghost frames for today's daily
  FB.dailyGhost = async (date) => {
    const q = F.query(F.collection(db,'daily',date,'scores'), F.orderBy('score','desc'), F.limit(1));
    const snap = await F.getDocs(q);
    if (snap.empty) return null;
    const d = snap.docs[0];
    if (d.id === FB.uid) return null;           // don't race yourself
    const data = d.data();
    if (!data.ghost) return null;
    try{ return { name:data.name, score:data.score||0, frames: JSON.parse(data.ghost) }; }
    catch(e){ return null; }
  };

  /* ---- weekly leaderboard: /weekly/{week}/scores/{uid} ---- */
  let weeklyBestLocal = {};
  FB.submitWeekly = async (week, score) => {
    if (!FB.uid || !week) return;
    if (!(score > (weeklyBestLocal[week]||0))) return;
    weeklyBestLocal[week] = score;
    await F.setDoc(F.doc(db, 'weekly', week, 'scores', FB.uid), {
      name: FB.name || defaultName(),
      score,
      updatedAt: F.serverTimestamp(),
    }, { merge:true });
  };
  FB.topWeekly = async (week, n=10) => {
    const q = F.query(F.collection(db,'weekly',week,'scores'), F.orderBy('score','desc'), F.limit(n));
    const snap = await F.getDocs(q);
    return snap.docs.map(d => ({ name:d.data().name, score:d.data().score||0, me: d.id===FB.uid }));
  };

  FB.signInGoogle = async () => {
    const prov = new A.GoogleAuthProvider();
    const keepName = FB.name, keepBest = serverBest;
    const res = await A.signInWithPopup(auth, prov);
    FB.uid = res.user.uid; FB.isAnon = false;
    // carry the guest run's name/score onto the Google account if it's better
    try {
      const snap = await F.getDoc(myDoc());
      const existing = snap.exists() ? (snap.data().score||0) : 0;
      serverBest = Math.max(existing, keepBest);
      FB.name = (snap.exists() && snap.data().name) || keepName || (res.user.displayName||'').slice(0,12) || defaultName();
      await F.setDoc(myDoc(), { name:FB.name, score:serverBest, updatedAt:F.serverTimestamp() }, { merge:true });
    } catch(e){}
  };
} catch(e){
  window.FB.offlineReason = 'Could not reach Firebase. Check your internet connection and that the config values are correct.';
  console.warn('Firebase failed to load — leaderboard offline.', e);
}
</script>
